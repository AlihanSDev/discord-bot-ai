# PostgreSQL Configuration for Discord AI Bot
# This config enables SSL/TLS encryption and optimizes for production

# ========== Connection Settings ==========
listen_addresses = '*'
max_connections = 100
superuser_reserved_connections = 3

# ========== SSL/TLS Encryption ==========
# Enable SSL
ssl = on
ssl_cert_file = '/etc/ssl/certs/postgres.crt'
ssl_key_file = '/etc/ssl/private/postgres.key'
ssl_ca_file = '/etc/ssl/certs/postgres.ca'
ssl_min_protocol_version = 'TLSv1.3'
ssl_ciphers = 'HIGH:MEDIUM:+TLSv1.3'

# Require SSL for all connections (optional: set to false for local dev)
# password_encryption = scram-sha-256

# ========== Memory ==========
shared_buffers = 128MB
effective_cache_size = 1GB
work_mem = 4MB
maintenance_work_mem = 32MB
max_parallel_workers_per_gather = 2
max_parallel_workers = 4

# ========== WAL Logging ==========
wal_level = replica
wal_buffers = 4MB
checkpoint_completion_target = 0.9
max_wal_size = 1GB
min_wal_size = 80MB

# ========== Autovacuum ==========
autovacuum = on
autovacuum_max_workers = 2
autovacuum_naptime = 1min
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50

# ========== Logging ==========
log_destination = 'csvlog'
logging_collector = on
log_directory = '/var/log/postgresql'
log_filename = 'postgresql-%Y-%m-%d.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_min_messages = warning
log_min_error_statement = error
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '

# ========== Security ==========
# Enable row-level security if needed
# row_security = on

# Log all statements (disabled for performance, enable for audit if needed)
# log_statement = 'none'

# ========== Performance Tuning ==========
random_page_cost = 1.1
effective_io_concurrency = 200
max_worker_processes = 8

# ========== Constraints ==========
# Checkpoint timeouts
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9

# ========== Replication (if needed) ==========
# wal_level = replica
# max_replication_slots = 4
# max_wal_senders = 4

