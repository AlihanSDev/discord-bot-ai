# Docker Compose override for production monitoring stack
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

version: '3.8'

services:
  bot:
    environment:
      - SENTRY_DSN=${SENTRY_DSN:-}
      - LOG_LEVEL=INFO
    volumes:
      - ./logs:/app/logs:rw
    restart: unless-stopped
    # Uncomment for resource monitoring
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '1.0'
    #       memory: 512M
    #     reservations:
    #       cpus: '0.5'
    #       memory: 256M

  # Optional: Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: discord-bot-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - bot-network
    ports:
      - "127.0.0.1:9090:9090"
    profiles:
      - monitoring
    labels:
      logging: "promtail"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Optional: Grafana dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: discord-bot-grafana
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - bot-network
    ports:
      - "127.0.0.1:3000:3000"
    profiles:
      - monitoring
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=redis-datasource
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: Loki for log aggregation
  loki:
    image: grafana/loki:latest
    container_name: discord-bot-loki
    restart: unless-stopped
    volumes:
      - ./logs:/var/log/discord-bot:ro
      - loki_data:/loki
    networks:
      - bot-network
    ports:
      - "127.0.0.1:3100:3100"
    profiles:
      - monitoring
    command: -config.file=/etc/loki/local-config.yaml

  # Optional: cAdvisor for container metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: discord-bot-cadvisor
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - bot-network
    ports:
      - "127.0.0.1:8081:8080"
    profiles:
      - monitoring

  # Optional: Nginx reverse proxy with SSL termination
  nginx:
    image: nginx:alpine
    container_name: discord-bot-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx:rw
    networks:
      - bot-network
    ports:
      - "80:80"
      - "443:443"
    profiles:
      - proxy
    depends_on:
      - bot
      - prometheus

volumes:
  prom_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local

networks:
  bot-network:
    external: true
